# ─── Servidor ───────────────────────────────────────────────────
server.port=8080

# ─── Virtual Threads (Java 25 / JEP 425) ────────────────────────
# Delega todos los hilos del servidor Tomcat 11 a Virtual Threads
spring.threads.virtual.enabled=true

# ─── Base de datos MySQL ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sigb_db?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate 7 ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────────
# Clave secreta HS256 en Base64 (mínimo 256 bits)
jwt.secret=c2lnYi1zZWNyZXQta2V5LWZvci1qd3QtYXV0aGVudGljYXRpb24tMjAyNg==
jwt.expiration=86400000

# ─── Correo electrónico (SMTP Gmail) ─────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=biblioteca@gmail.com
spring.mail.password=app_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Jackson 3 ───────────────────────────────────────────────────

spring.jackson.default-property-inclusion=non_null

# ─── Logging ─────────────────────────────────────────────────────
logging.level.com.library.sigb=DEBUG
logging.level.org.springframework.security=WARN
