<nav class="navbar navbar-expand-lg lib-navbar shadow-sm">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <i class="bi bi-book-half me-2"></i>SIGB Biblioteca
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMain" aria-controls="navMain"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
        @if (isLibrarian()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/librarian" routerLinkActive="active">
              <i class="bi bi-clipboard-check me-1"></i>Bibliotecario
            </a>
          </li>
        }

        @if (isAdmin()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin" routerLinkActive="active">
              <i class="bi bi-gear me-1"></i>Administración
            </a>
          </li>
        }
      </ul>

      <ul class="navbar-nav ms-auto">
        @if (isLoggedIn()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="active">
              <i class="bi bi-person-fill me-1"></i>{{ username() }}
            </a>
          </li>
          <li class="nav-item">
            <button class="btn btn-sm btn-outline-danger ms-2" (click)="openLogoutModal()">
              <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
            </button>
          </li>
        } @else {
          <li class="nav-item">
            <a class="btn-login px-3 py-2 d-inline-block" routerLink="/login">
              <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión
            </a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>

<!-- Modal Cerrar Sesión -->
@if (showLogoutModal()) {
  <div class="modal fade show d-block" tabindex="-1" style="background:rgba(0,0,0,.5)">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <i class="bi bi-box-arrow-right me-2" style="color:#e07070"></i>Cerrar Sesión
          </h5>
          <button class="btn-close" (click)="closeLogoutModal()"></button>
        </div>
        <div class="modal-body">
          ¿Estás seguro de que quieres cerrar la sesión?
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeLogoutModal()">Cancelar</button>
          <button class="btn btn-danger" (click)="confirmLogout()">Cerrar Sesión</button>
        </div>
      </div>
    </div>
  </div>
}
